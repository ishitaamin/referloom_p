name: Release ReferLoom APK

on:
  push:
    tags:
      - 'v*' # This triggers the workflow when you push a tag like v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the GitHub Release page

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 3. Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 4. Install Dependencies
        working-directory: ./referloom_fixed
        run: npm install

      - name: 5. Build Android APK via EAS
        working-directory: ./referloom_fixed
        # The --wait flag waits for Expo servers to finish building
        # The --output flag downloads the finished file back to GitHub
        run: eas build --platform android --profile production --non-interactive --wait --output ./ReferLoom.apk

      - name: 6. Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./referloom_fixed/ReferLoom.apk
          generate_release_notes: true